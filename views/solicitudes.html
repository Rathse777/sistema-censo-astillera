<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Solicitudes | Sistema Censo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- ===== BARRA DE NAVEGACIÓN COMPLETA ===== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-home"></i> Censo La Astillera</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-chart-line"></i> Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/habitantes"><i class="fas fa-users"></i> Habitantes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/viviendas"><i class="fas fa-home"></i> Viviendas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/servicios"><i class="fas fa-box"></i> Servicios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/solicitudes"><i class="fas fa-clipboard-list"></i> Solicitudes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/notificaciones"><i class="fas fa-bullhorn"></i> Notificaciones</a>
                    </li>
                    <li class="nav-item" id="bitacoraMenu" style="display: none;">
                        <a class="nav-link" href="/bitacora"><i class="fas fa-history"></i> Bitácora</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="fas fa-user"></i> <span id="userName">Usuario</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/perfil"><i class="fas fa-id-card"></i> Mi Perfil</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- ===== FIN BARRA DE NAVEGACIÓN ===== -->

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-clipboard-list"></i> Gestión de Solicitudes</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalSolicitud" onclick="limpiarFormSolicitud()">
                <i class="fas fa-plus"></i> Nueva Solicitud
            </button>
        </div>

        <div id="alertContainer"></div>

        <div class="card shadow">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Vivienda</th>
                                <th>Servicio</th>
                                <th>Fecha Solicitud</th>
                                <th>Fecha Entrega</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="solicitudesTable">
                            <tr><td colspan="7" class="text-center">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para solicitud (mantener igual) -->
    <div class="modal fade" id="modalSolicitud" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-truck"></i> <span id="modalTitle">Registrar Solicitud</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="solicitudForm">
                        <input type="hidden" id="editSolicitudId">
                        <div class="mb-3">
                            <label>Vivienda *</label>
                            <select class="form-control" id="id_vivienda" required></select>
                        </div>
                        <div class="mb-3">
                            <label>Servicio *</label>
                            <select class="form-control" id="id_servicio" required></select>
                        </div>
                        <div class="mb-3">
                            <label>Observaciones</label>
                            <textarea class="form-control" id="observaciones"></textarea>
                        </div>
                        <div class="mb-3">
                            <label>Fecha de Entrega</label>
                            <input type="date" class="form-control" id="fecha_entrega">
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="entregado">
                            <label class="form-check-label">Entregado</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" id="guardarSolicitudBtn">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.location.origin;
        let token = localStorage.getItem('token');
        let usuarioActual = null;

        async function verificarSesion() {
            if (!token) { window.location.href = '/login'; return false; }
            try {
                const response = await fetch('/api/auth/verificar', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (!data.authenticated) { localStorage.removeItem('token'); window.location.href = '/login'; return false; }
                usuarioActual = data.usuario;
                document.getElementById('userName').textContent = usuarioActual.nombre_usuario;
                if (usuarioActual.nivel >= 3) {
                    document.getElementById('bitacoraMenu').style.display = 'block';
                }
                return true;
            } catch (error) { window.location.href = '/login'; return false; }
        }

        async function cargarViviendas() {
            const response = await fetch('/api/viviendas', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const viviendas = await response.json();
            const select = document.getElementById('id_vivienda');
            select.innerHTML = '<option value="">Seleccione...</option>';
            viviendas.forEach(v => {
                select.innerHTML += `<option value="${v.id_vivienda}">Casa ${v.nro_casa}</option>`;
            });
        }

        async function cargarServicios() {
            const response = await fetch('/api/servicios', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const servicios = await response.json();
            const select = document.getElementById('id_servicio');
            select.innerHTML = '<option value="">Seleccione...</option>';
            servicios.forEach(s => {
                select.innerHTML += `<option value="${s.id_servicio}">${s.nombre_servicio}</option>`;
            });
        }

        async function cargarSolicitudes() {
            const response = await fetch('/api/solicitudes', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const solicitudes = await response.json();
            const tbody = document.getElementById('solicitudesTable');
            if (solicitudes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">No hay solicitudes registradas</td></tr>';
                return;
            }
            tbody.innerHTML = solicitudes.map(s => `
                <tr>
                    <td>${s.id_solicitud}</td>
                    <td>Casa ${s.nro_casa}</td>
                    <td>${s.nombre_servicio}</td>
                    <td>${new Date(s.fecha_peticion).toLocaleDateString()}</td>
                    <td>${s.fecha_entrega ? new Date(s.fecha_entrega).toLocaleDateString() : '-'}</td>
                    <td><span class="badge ${s.entregado ? 'bg-success' : 'bg-warning'}">${s.entregado ? 'Entregado' : 'Pendiente'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="editarSolicitud(${s.id_solicitud})"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarSolicitud(${s.id_solicitud})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function guardarSolicitud() {
            const id = document.getElementById('editSolicitudId').value;
            const data = {
                id_vivienda: document.getElementById('id_vivienda').value,
                id_servicio: document.getElementById('id_servicio').value,
                observaciones: document.getElementById('observaciones').value,
                fecha_entrega: document.getElementById('fecha_entrega').value || null,
                entregado: document.getElementById('entregado').checked
            };
            const url = id ? `/api/solicitudes/${id}` : '/api/solicitudes';
            const method = id ? 'PUT' : 'POST';
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            if (response.ok) {
                mostrarAlerta(id ? 'Solicitud actualizada' : 'Solicitud registrada', 'success');
                bootstrap.Modal.getInstance(document.getElementById('modalSolicitud')).hide();
                cargarSolicitudes();
                limpiarFormSolicitud();
            } else {
                const error = await response.json();
                mostrarAlerta(error.error || 'Error al guardar', 'danger');
            }
        }

        window.editarSolicitud = async function(id) {
            const response = await fetch(`/api/solicitudes/${id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const s = await response.json();
            document.getElementById('editSolicitudId').value = s.id_solicitud;
            document.getElementById('id_vivienda').value = s.id_vivienda;
            document.getElementById('id_servicio').value = s.id_servicio;
            document.getElementById('observaciones').value = s.observaciones || '';
            document.getElementById('fecha_entrega').value = s.fecha_entrega ? s.fecha_entrega.split('T')[0] : '';
            document.getElementById('entregado').checked = s.entregado;
            document.getElementById('modalTitle').textContent = 'Editar Solicitud';
            new bootstrap.Modal(document.getElementById('modalSolicitud')).show();
        };

        window.eliminarSolicitud = async function(id) {
            if (confirm('¿Eliminar esta solicitud?')) {
                await fetch(`/api/solicitudes/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                cargarSolicitudes();
            }
        };

        function limpiarFormSolicitud() {
            document.getElementById('solicitudForm').reset();
            document.getElementById('editSolicitudId').value = '';
            document.getElementById('modalTitle').textContent = 'Registrar Solicitud';
        }

        function mostrarAlerta(mensaje, tipo) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${tipo} alert-dismissible fade show">
                    ${mensaje}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        document.getElementById('guardarSolicitudBtn').addEventListener('click', guardarSolicitud);
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/login';
        });

        async function init() {
            if (await verificarSesion()) {
                cargarViviendas();
                cargarServicios();
                cargarSolicitudes();
            }
        }
        init();
    </script>
</body>
</html>
