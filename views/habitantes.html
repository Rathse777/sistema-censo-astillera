<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Habitantes | Sistema Censo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- ===== BARRA DE NAVEGACIÓN COMPLETA ===== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-home"></i> Censo La Astillera</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-chart-line"></i> Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/habitantes"><i class="fas fa-users"></i> Habitantes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/viviendas"><i class="fas fa-home"></i> Viviendas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/servicios"><i class="fas fa-box"></i> Servicios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/solicitudes"><i class="fas fa-clipboard-list"></i> Solicitudes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/notificaciones"><i class="fas fa-bullhorn"></i> Notificaciones</a>
                    </li>
                    <li class="nav-item" id="bitacoraMenu" style="display: none;">
                        <a class="nav-link" href="/bitacora"><i class="fas fa-history"></i> Bitácora</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="fas fa-user"></i> <span id="userName">Usuario</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/perfil"><i class="fas fa-id-card"></i> Mi Perfil</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- ===== FIN BARRA DE NAVEGACIÓN ===== -->

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-users"></i> Gestión de Habitantes</h2>
            <button class="btn btn-primary" id="nuevoHabitanteBtn" data-bs-toggle="modal" data-bs-target="#modalHabitante">
                <i class="fas fa-plus"></i> Nuevo Habitante
            </button>
        </div>

        <!-- Alerta de permisos -->
        <div id="permisoAlert" style="display: none;" class="alert alert-warning">
            <i class="fas fa-exclamation-triangle"></i> 
            <span id="permisoMensaje"></span>
        </div>

        <div id="alertContainer"></div>

        <div class="card shadow">
            <div class="card-body">
                <input type="text" id="searchInput" class="form-control mb-3" placeholder="🔍 Buscar por cédula o nombre...">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Cédula</th>
                                <th>Nombre Completo</th>
                                <th>Edad</th>
                                <th>Grupo</th>
                                <th>Vivienda</th>
                                <th>Jefe Familia</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="habitantesTable">
                            <tr><td colspan="7" class="text-center">Cargando datos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para crear/editar habitante -->
    <div class="modal fade" id="modalHabitante" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-user-plus"></i> <span id="modalTitle">Registrar Habitante</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="habitanteForm">
                        <input type="hidden" id="editMode" value="false">
                        <input type="hidden" id="editCedulaOriginal" value="">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Cédula *</label>
                                <input type="text" class="form-control" id="cedula" required placeholder="V-12345678">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre Completo *</label>
                                <input type="text" class="form-control" id="nombre_completo" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Fecha Nacimiento *</label>
                                <input type="date" class="form-control" id="fecha_nac" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Sexo *</label>
                                <select class="form-control" id="sexo">
                                    <option value="M">Masculino</option>
                                    <option value="F">Femenino</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Vivienda *</label>
                                <select class="form-control" id="id_vivienda" required></select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="text" class="form-control" id="telefono" placeholder="0414-1234567">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nivel Educativo</label>
                                <select class="form-control" id="nivel_educativo">
                                    <option value="Ninguno">Ninguno</option>
                                    <option value="Primaria">Primaria</option>
                                    <option value="Bachillerato">Bachillerato</option>
                                    <option value="TSU">TSU</option>
                                    <option value="Universitario">Universitario</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Discapacidad</label>
                                <input type="text" class="form-control" id="discapacidad" placeholder="Ninguna">
                            </div>
                            <div class="col-md-12 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="es_jefe_familia">
                                    <label class="form-check-label">Es Jefe/Jefa de Familia</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="estatus_migratorio">
                                    <label class="form-check-label">Está fuera del país (Emigrado)</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="guardarHabitanteBtn">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container para notificaciones flotantes -->
    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.location.origin;
        let token = localStorage.getItem('token');
        let usuarioActual = null;
        let todasViviendas = [];

        async function verificarSesion() {
            if (!token) { window.location.href = '/login'; return false; }
            try {
                const response = await fetch('/api/auth/verificar', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (!response.ok || !data.authenticated) {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                    return false;
                }
                usuarioActual = data.usuario;
                localStorage.setItem('usuario', JSON.stringify(usuarioActual));
                document.getElementById('userName').textContent = usuarioActual.nombre_usuario;
                
                const esAdmin = usuarioActual.nivel === 3;
                const esEditor = usuarioActual.nivel >= 2;
                
                if (!esEditor) {
                    document.getElementById('permisoAlert').style.display = 'block';
                    document.getElementById('permisoMensaje').textContent = 
                        'Solo puedes ver y editar los datos de tu familia. Los administradores y voceros gestionan todos los habitantes.';
                }
                if (esAdmin) {
                    document.getElementById('bitacoraMenu').style.display = 'block';
                }
                return true;
            } catch (error) {
                window.location.href = '/login';
                return false;
            }
        }

        async function cargarViviendas() {
            const response = await fetch('/api/viviendas', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            todasViviendas = await response.json();
            const select = document.getElementById('id_vivienda');
            select.innerHTML = '<option value="">Seleccione una vivienda...</option>';
            todasViviendas.forEach(v => {
                select.innerHTML += `<option value="${v.id_vivienda}">Casa ${v.nro_casa} - ${v.direccion.substring(0, 30)}</option>`;
            });
        }

        async function cargarHabitantes() {
            const response = await fetch('/api/habitantes', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const habitantes = await response.json();
            const tbody = document.getElementById('habitantesTable');
            const esEditor = usuarioActual?.nivel >= 2;
            
            if (habitantes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">No hay habitantes registrados</td></tr>';
                return;
            }
            
            tbody.innerHTML = habitantes.map(h => `
                <tr>
                    <td>${h.cedula}</td>
                    <td>${h.nombre_completo}</td>
                    <td>${h.edad || '-'} años</td>
                    <td><span class="badge ${h.edad >= 60 ? 'bg-danger' : (h.edad <= 11 ? 'bg-warning' : 'bg-info')}">${h.grupo_etario || '-'}</span></td>
                    <td>Casa ${h.nro_casa || '-'}</td>
                    <td>${h.es_jefe_familia ? '✅ Sí' : '❌ No'}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="editarHabitante('${h.cedula}')"><i class="fas fa-edit"></i></button>
                        ${esEditor ? `<button class="btn btn-sm btn-danger" onclick="eliminarHabitante('${h.cedula}')"><i class="fas fa-trash"></i></button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        async function guardarHabitante() {
            const data = {
                cedula: document.getElementById('cedula').value,
                nombre_completo: document.getElementById('nombre_completo').value,
                fecha_nac: document.getElementById('fecha_nac').value,
                sexo: document.getElementById('sexo').value,
                id_vivienda: document.getElementById('id_vivienda').value,
                telefono: document.getElementById('telefono').value,
                email: document.getElementById('email').value,
                nivel_educativo: document.getElementById('nivel_educativo').value,
                discapacidad: document.getElementById('discapacidad').value || 'Ninguna',
                es_jefe_familia: document.getElementById('es_jefe_familia').checked,
                estatus_migratorio: document.getElementById('estatus_migratorio').checked
            };

            const editMode = document.getElementById('editMode').value === 'true';
            const cedulaOriginal = document.getElementById('editCedulaOriginal').value;
            const url = editMode ? `/api/habitantes/${cedulaOriginal}` : '/api/habitantes';
            const method = editMode ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    mostrarAlerta(editMode ? 'Habitante actualizado' : 'Habitante registrado', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('modalHabitante')).hide();
                    cargarHabitantes();
                    limpiarFormulario();
                } else {
                    const error = await response.json();
                    mostrarAlerta(error.error || 'Error al guardar', 'danger');
                }
            } catch (error) {
                mostrarAlerta('Error de conexión', 'danger');
            }
        }

        window.editarHabitante = async function(cedula) {
            const response = await fetch(`/api/habitantes/${cedula}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const h = await response.json();
            
            document.getElementById('modalTitle').textContent = 'Editar Habitante';
            document.getElementById('editMode').value = 'true';
            document.getElementById('editCedulaOriginal').value = h.cedula;
            document.getElementById('cedula').value = h.cedula;
            document.getElementById('cedula').readOnly = true;
            document.getElementById('nombre_completo').value = h.nombre_completo;
            document.getElementById('fecha_nac').value = h.fecha_nac?.split('T')[0] || '';
            document.getElementById('sexo').value = h.sexo;
            document.getElementById('id_vivienda').value = h.id_vivienda;
            document.getElementById('telefono').value = h.telefono || '';
            document.getElementById('email').value = h.email || '';
            document.getElementById('nivel_educativo').value = h.nivel_educativo || 'Ninguno';
            document.getElementById('discapacidad').value = h.discapacidad;
            document.getElementById('es_jefe_familia').checked = h.es_jefe_familia;
            document.getElementById('estatus_migratorio').checked = h.estatus_migratorio;
            
            new bootstrap.Modal(document.getElementById('modalHabitante')).show();
        };

        window.eliminarHabitante = async function(cedula) {
            if (!confirm('¿Eliminar este habitante?')) return;
            const response = await fetch(`/api/habitantes/${cedula}`, { 
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                mostrarAlerta('Habitante eliminado', 'success');
                cargarHabitantes();
            } else {
                mostrarAlerta('Error al eliminar', 'danger');
            }
        };

        function limpiarFormulario() {
            document.getElementById('habitanteForm').reset();
            document.getElementById('editMode').value = 'false';
            document.getElementById('editCedulaOriginal').value = '';
            document.getElementById('cedula').readOnly = false;
            document.getElementById('modalTitle').textContent = 'Registrar Habitante';
        }

        function mostrarAlerta(mensaje, tipo) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${tipo} alert-dismissible fade show">
                    ${mensaje}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            setTimeout(() => {
                const alert = container.querySelector('.alert');
                if (alert) alert.remove();
            }, 5000);
        }

        // Cargar notificaciones como toast flotante
        async function cargarNotificacionesFlotantes() {
            try {
                const response = await fetch('/api/notificaciones', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) return;
                const notificaciones = await response.json();
                
                const toastContainer = document.getElementById('toastContainer');
                if (!toastContainer || notificaciones.length === 0) return;
                
                const vistas = JSON.parse(localStorage.getItem('notificaciones_vistas') || '[]');
                
                notificaciones.forEach(n => {
                    if (!vistas.includes(n.id_notificacion)) {
                        const toast = document.createElement('div');
                        toast.className = `toast align-items-center text-white bg-${n.tipo} border-0 mb-2`;
                        toast.style.minWidth = '280px';
                        
                        toast.innerHTML = `
                            <div class="d-flex">
                                <div class="toast-body">
                                    <strong><i class="fas fa-bullhorn me-2"></i>${n.titulo}</strong>
                                    <p class="mb-0 small">${n.mensaje.substring(0, 80)}${n.mensaje.length > 80 ? '...' : ''}</p>
                                </div>
                                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                            </div>
                        `;
                        
                        toastContainer.appendChild(toast);
                        const bsToast = new bootstrap.Toast(toast, { delay: 6000 });
                        bsToast.show();
                        
                        toast.addEventListener('hidden.bs.toast', () => toast.remove());
                        vistas.push(n.id_notificacion);
                    }
                });
                
                localStorage.setItem('notificaciones_vistas', JSON.stringify(vistas.slice(-50)));
            } catch (error) {
                console.error('Error cargando notificaciones:', error);
            }
        }

        document.getElementById('guardarHabitanteBtn').addEventListener('click', guardarHabitante);
        
        document.getElementById('searchInput')?.addEventListener('keyup', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('#habitantesTable tr').forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
            });
        });

        document.getElementById('modalHabitante').addEventListener('hidden.bs.modal', limpiarFormulario);

        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('usuario');
            localStorage.removeItem('notificaciones_vistas');
            window.location.href = '/login';
        });

        async function init() {
            if (await verificarSesion()) {
                await cargarViviendas();
                await cargarHabitantes();
                await cargarNotificacionesFlotantes();
                setInterval(cargarNotificacionesFlotantes, 60000);
            }
        }
        init();
    </script>
</body>
</html>
