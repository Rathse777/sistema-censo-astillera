<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Servicios | Sistema Censo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- ===== BARRA DE NAVEGACIÓN COMPLETA ===== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-home"></i> Censo La Astillera</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-chart-line"></i> Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/habitantes"><i class="fas fa-users"></i> Habitantes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/viviendas"><i class="fas fa-home"></i> Viviendas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/servicios"><i class="fas fa-box"></i> Servicios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/solicitudes"><i class="fas fa-clipboard-list"></i> Solicitudes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/notificaciones"><i class="fas fa-bullhorn"></i> Notificaciones</a>
                    </li>
                    <li class="nav-item" id="bitacoraMenu" style="display: none;">
                        <a class="nav-link" href="/bitacora"><i class="fas fa-history"></i> Bitácora</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="fas fa-user"></i> <span id="userName">Usuario</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/perfil"><i class="fas fa-id-card"></i> Mi Perfil</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- ===== FIN BARRA DE NAVEGACIÓN ===== -->

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-box"></i> Gestión de Servicios</h2>
            <button class="btn btn-primary" id="nuevoServicioBtn" data-bs-toggle="modal" data-bs-target="#modalServicio" style="display: none;">
                <i class="fas fa-plus"></i> Nuevo Servicio
            </button>
        </div>

        <div id="permisoAlert" style="display: none;" class="alert alert-info">
            <i class="fas fa-info-circle"></i> 
            <span id="permisoMensaje"></span>
        </div>

        <div id="alertContainer"></div>

        <div class="card shadow">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Servicio</th>
                                <th>Descripción</th>
                                <th>Rango Edad</th>
                                <th>Estado</th>
                                <th>Solicitudes</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="serviciosTable">
                            <tr><td colspan="7" class="text-center">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para crear/editar servicio (mantener igual al original) -->
    <div class="modal fade" id="modalServicio" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-plus-circle"></i> <span id="modalTitle">Registrar Servicio</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="servicioForm">
                        <input type="hidden" id="editServicioId">
                        <div class="mb-3">
                            <label>Nombre del Servicio *</label>
                            <input type="text" class="form-control" id="nombre_servicio" required>
                        </div>
                        <div class="mb-3">
                            <label>Descripción</label>
                            <textarea class="form-control" id="descripcion" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <label>Edad Mínima</label>
                                <input type="number" class="form-control" id="criterio_edad_min" value="0">
                            </div>
                            <div class="col-md-6">
                                <label>Edad Máxima</label>
                                <input type="number" class="form-control" id="criterio_edad_max" value="120">
                            </div>
                        </div>
                        <div class="mt-3 form-check">
                            <input class="form-check-input" type="checkbox" id="activo" checked>
                            <label class="form-check-label">Servicio Activo</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" id="guardarServicioBtn">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.location.origin;
        let token = localStorage.getItem('token');
        let usuarioActual = null;

        async function verificarSesion() {
            if (!token) { window.location.href = '/login'; return false; }
            try {
                const response = await fetch('/api/auth/verificar', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (!response.ok || !data.authenticated) {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                    return false;
                }
                usuarioActual = data.usuario;
                document.getElementById('userName').textContent = usuarioActual.nombre_usuario;
                
                const esAdmin = usuarioActual.nivel === 3;
                if (esAdmin) {
                    document.getElementById('nuevoServicioBtn').style.display = 'block';
                    document.getElementById('bitacoraMenu').style.display = 'block';
                } else {
                    document.getElementById('permisoAlert').style.display = 'block';
                    document.getElementById('permisoMensaje').textContent = 
                        'Modo solo lectura. Solo administradores pueden crear, editar o eliminar servicios.';
                }
                return true;
            } catch (error) {
                window.location.href = '/login';
                return false;
            }
        }

        async function cargarServicios() {
            const response = await fetch('/api/servicios', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const servicios = await response.json();
            const tbody = document.getElementById('serviciosTable');
            const esAdmin = usuarioActual?.nivel === 3;
            
            if (servicios.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">No hay servicios registrados</td></tr>';
                return;
            }
            
            tbody.innerHTML = servicios.map(s => `
                <tr>
                    <td>${s.id_servicio}</td>
                    <td><strong>${s.nombre_servicio}</strong></td>
                    <td>${s.descripcion || '-'}</td>
                    <td>${s.criterio_edad_min} - ${s.criterio_edad_max} años</td>
                    <td><span class="badge ${s.activo ? 'bg-success' : 'bg-secondary'}">${s.activo ? 'Activo' : 'Inactivo'}</span></td>
                    <td><span class="badge bg-info">${s.total_solicitudes || 0} solicitudes</span></td>
                    <td>
                        ${esAdmin ? `
                            <button class="btn btn-sm btn-warning" onclick="editarServicio(${s.id_servicio})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-danger" onclick="eliminarServicio(${s.id_servicio})"><i class="fas fa-trash"></i></button>
                        ` : `
                            <button class="btn btn-sm btn-secondary" disabled><i class="fas fa-eye"></i> Solo lectura</button>
                        `}
                    </td>
                </tr>
            `).join('');
        }

        async function guardarServicio() {
            const id = document.getElementById('editServicioId').value;
            const data = {
                nombre_servicio: document.getElementById('nombre_servicio').value,
                descripcion: document.getElementById('descripcion').value,
                criterio_edad_min: document.getElementById('criterio_edad_min').value,
                criterio_edad_max: document.getElementById('criterio_edad_max').value,
                activo: document.getElementById('activo').checked
            };
            
            const url = id ? `/api/servicios/${id}` : '/api/servicios';
            const method = id ? 'PUT' : 'POST';
            
            const response = await fetch(url, {
                method: method,
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                mostrarAlerta(id ? 'Servicio actualizado' : 'Servicio registrado', 'success');
                bootstrap.Modal.getInstance(document.getElementById('modalServicio')).hide();
                cargarServicios();
                limpiarFormServicio();
            } else {
                const error = await response.json();
                mostrarAlerta(error.error || 'Error al guardar', 'danger');
            }
        }

        window.editarServicio = async function(id) {
            const response = await fetch(`/api/servicios/${id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const s = await response.json();
            document.getElementById('editServicioId').value = s.id_servicio;
            document.getElementById('nombre_servicio').value = s.nombre_servicio;
            document.getElementById('descripcion').value = s.descripcion || '';
            document.getElementById('criterio_edad_min').value = s.criterio_edad_min;
            document.getElementById('criterio_edad_max').value = s.criterio_edad_max;
            document.getElementById('activo').checked = s.activo;
            document.getElementById('modalTitle').textContent = 'Editar Servicio';
            new bootstrap.Modal(document.getElementById('modalServicio')).show();
        };

        window.eliminarServicio = async function(id) {
            if (confirm('¿Eliminar este servicio? Se eliminarán también las solicitudes asociadas.')) {
                const response = await fetch(`/api/servicios/${id}`, { 
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    mostrarAlerta('Servicio eliminado', 'success');
                    cargarServicios();
                } else {
                    const error = await response.json();
                    mostrarAlerta(error.error || 'Error al eliminar', 'danger');
                }
            }
        };

        function limpiarFormServicio() {
            document.getElementById('servicioForm').reset();
            document.getElementById('editServicioId').value = '';
            document.getElementById('criterio_edad_min').value = 0;
            document.getElementById('criterio_edad_max').value = 120;
            document.getElementById('activo').checked = true;
            document.getElementById('modalTitle').textContent = 'Registrar Servicio';
        }

        function mostrarAlerta(mensaje, tipo) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${tipo} alert-dismissible fade show">
                    ${mensaje}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        document.getElementById('guardarServicioBtn').addEventListener('click', guardarServicio);
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/login';
        });

        async function init() {
            if (await verificarSesion()) {
                cargarServicios();
            }
        }
        init();
    </script>
</body>
</html>
